<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cherry+Cream+Soda&family=Sono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { overflow: hidden; background: #000; }

    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;

      background:
        linear-gradient(
          to right,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.35) 18%,
          rgba(0, 0, 0, 0) 35%,
          rgba(0, 0, 0, 0) 65%,
          rgba(0, 0, 0, 0.35) 82%,
          rgba(0, 0, 0, 0.85) 100%
        ),
        radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 45%,
          rgba(0, 0, 0, 0.5) 100%
        );
    }

    .wipe {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      background: #fff;
      z-index: 2;
      pointer-events: none;
    }
    #wipeLeft  { left: 0; }
    #wipeRight { right: 0; }

    #startScreen {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-family: "Sono", system-ui, "Segoe UI", sans-serif;
      letter-spacing: 0.04em;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #startScreen .hint {
      font-family: "Sono", system-ui, "Segoe UI", sans-serif;
      font-weight: 600;
      font-size: clamp(16px, 2.4vw, 26px);
      opacity: 0.25;
    }
    #startScreen.ready .hint {
      opacity: 1;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #startScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50%      { opacity: 1; }
    }

    #endScreen {
      position: absolute;
      inset: 0;
      z-index: 4;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #endScreen.show { opacity: 1; }

    .text-type {
      --end-font: clamp(40px, 9vw, 80px);
      font-family: "Cherry Cream Soda", system-ui, cursive;
      font-size: var(--end-font);
      line-height: 1.1;
      color: #000000;
      white-space: pre-wrap;
      display: inline-flex;
      align-items: baseline;
    }
    .text-type__cursor {
      margin-left: 0.1em;
      display: inline-block;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="preloader">
    <canvas id="c"></canvas>
    <div id="vignette"></div>
    <div id="wipeLeft"  class="wipe"></div>
    <div id="wipeRight" class="wipe"></div>

    <div id="startScreen">
      <div class="hint">click or press space</div>
    </div>

    <div id="endScreen">
      <div class="text-type">
        <span id="endText" class="text-type__content"></span><span class="text-type__cursor">_</span>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
